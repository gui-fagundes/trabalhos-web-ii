<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketMVP | Confirmar e-mail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
              body: ["Plus Jakarta Sans", "sans-serif"],
            },
            colors: {
              brand: { 50: "#F8F7F2", 100: "#EDE8D8", 200: "#D9CEAA", 300: "#C7B57D", 400: "#B99B56", 500: "#A8853A", 600: "#886B2F", 700: "#665024", 800: "#43361A", 900: "#251E10" },
              accent: { 500: "#0A7D7A", 600: "#075F5D" },
              coral: { 500: "#E66A4E", 600: "#C85339" },
            },
          },
        },
      };
    </script>
    <style>
      .grid-bg {
        background-image: radial-gradient(#d9ceaa 0.8px, transparent 0.8px), radial-gradient(#d9ceaa 0.8px, #f8f7f2 0.8px);
        background-size: 28px 28px;
        background-position: 0 0, 14px 14px;
      }
    </style>
  </head>
  <body class="font-body bg-brand-50 text-brand-900">
    <div class="min-h-screen grid-bg">
      <header class="border-b border-brand-200/80 bg-white/75 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
          <a href="index.html" class="font-display text-xl font-bold">MarketMVP</a>
          <a href="login.html" class="rounded-full border border-brand-300 px-4 py-2 text-sm font-semibold hover:bg-brand-100">Já tenho o código</a>
        </div>
      </header>

      <main class="mx-auto flex max-w-7xl items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
        <section class="w-full max-w-md rounded-3xl border border-brand-200 bg-white p-6 shadow-sm">
          <h1 class="font-display text-3xl font-bold">Confirme seu e-mail</h1>
          <p class="mt-1 text-sm text-brand-700">
            Enviamos um código de verificação de 6 dígitos. Em ambiente de aula, o código aparece no console/log do servidor
            (o envio real de e-mail está fora do escopo por enquanto).
          </p>
          <form id="verify-form" class="mt-5 space-y-4">
            <label class="block">
              <span class="mb-1 block text-sm font-medium">Email</span>
              <input id="email" type="email" required class="w-full rounded-xl border border-brand-300 px-4 py-2.5 outline-none ring-coral-500 focus:ring" />
            </label>
            <label class="block">
              <span class="mb-1 block text-sm font-medium">Código</span>
              <input id="code" type="text" required minlength="6" maxlength="6" class="w-full rounded-xl border border-brand-300 px-4 py-2.5 outline-none ring-coral-500 focus:ring" />
            </label>
            <p id="form-message" class="hidden text-sm font-medium"></p>
            <button type="submit" class="w-full rounded-xl bg-brand-900 px-4 py-2.5 font-semibold text-brand-50 hover:bg-brand-800">Confirmar e-mail</button>
          </form>
          <button id="resend-button" class="mt-3 w-full rounded-xl border border-brand-300 px-4 py-2.5 font-semibold hover:bg-brand-100">Reenviar código</button>
        </section>
      </main>
    </div>
    <script src="api.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const emailField = document.getElementById("email");
      if (params.get("email")) emailField.value = params.get("email");

      const form = document.getElementById("verify-form");
      const message = document.getElementById("form-message");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          await apiFetch("/auth/verify-email", {
            method: "POST",
            body: JSON.stringify({ email: emailField.value.trim(), code: document.getElementById("code").value.trim() }),
          });
          showFormMessage(message, "E-mail verificado! Redirecionando para o login...", false);
          setTimeout(() => (window.location.href = "login.html"), 1200);
        } catch (error) {
          showFormMessage(message, error.message, true);
        }
      });

      document.getElementById("resend-button").addEventListener("click", async () => {
        try {
          await apiFetch("/auth/resend-code", {
            method: "POST",
            body: JSON.stringify({ email: emailField.value.trim() }),
          });
          showFormMessage(message, "Novo código enviado (verifique o console do servidor).", false);
        } catch (error) {
          showFormMessage(message, error.message, true);
        }
      });
    </script>
  </body>
</html>
