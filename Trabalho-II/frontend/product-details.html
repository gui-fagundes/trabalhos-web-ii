<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketMVP | Detalhes do produto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
              body: ["Plus Jakarta Sans", "sans-serif"],
            },
            colors: {
              brand: { 50: "#F8F7F2", 100: "#EDE8D8", 200: "#D9CEAA", 300: "#C7B57D", 400: "#B99B56", 500: "#A8853A", 600: "#886B2F", 700: "#665024", 800: "#43361A", 900: "#251E10" },
              accent: { 500: "#0A7D7A", 600: "#075F5D" },
              coral: { 500: "#E66A4E", 600: "#C85339" },
            },
          },
        },
      };
    </script>
    <style>
      .grid-bg {
        background-image: radial-gradient(#d9ceaa 0.8px, transparent 0.8px), radial-gradient(#d9ceaa 0.8px, #f8f7f2 0.8px);
        background-size: 28px 28px;
        background-position: 0 0, 14px 14px;
      }
    </style>
  </head>
  <body class="font-body bg-brand-50 text-brand-900">
    <div class="min-h-screen grid-bg">
      <header class="border-b border-brand-200/80 bg-white/75 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
          <a href="index.html" class="font-display text-xl font-bold">MarketMVP</a>
          <nav id="nav-links" class="flex gap-3 text-sm font-medium"></nav>
        </div>
      </header>

      <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8 space-y-6">
        <section id="product-card" class="grid gap-6 rounded-3xl border border-brand-200 bg-white p-6 shadow-sm md:grid-cols-2">
          <div>
            <div class="rounded-2xl bg-brand-100 p-4">
              <img id="main-image" alt="" class="mx-auto h-72 w-full rounded-xl object-contain" />
            </div>
            <div id="thumbs" class="mt-3 flex gap-2 overflow-x-auto"></div>
          </div>
          <div>
            <p id="category" class="text-xs font-semibold uppercase tracking-wider text-brand-600"></p>
            <h1 id="product-name" class="mt-1 font-display text-3xl font-bold"></h1>
            <p class="mt-2 text-sm text-brand-700">Vendedor: <a id="seller-link" class="font-semibold text-accent-600" href="#"></a></p>
            <p id="description" class="mt-4 text-brand-700"></p>
            <p id="price" class="mt-5 font-display text-4xl font-bold text-coral-600"></p>
            <p id="stock" class="mt-1 text-sm text-brand-700"></p>
            <p class="mt-2 text-sm text-brand-700">Total de curtidas nos comentários: <span id="total-likes" class="font-semibold">0</span></p>
          </div>
        </section>

        <section class="rounded-3xl border border-brand-200 bg-white p-6 shadow-sm">
          <h2 class="font-display text-2xl font-bold">Comentários</h2>
          <p class="mt-1 text-sm text-brand-700">Usuários autenticados podem comentar. Comentários podem incluir uma foto opcional.</p>

          <form id="comment-form" enctype="multipart/form-data" class="mt-4 space-y-3 hidden">
            <textarea id="comment-text" required class="w-full rounded-xl border border-brand-300 px-4 py-2.5 outline-none ring-coral-500 focus:ring" placeholder="Escreva seu comentário..."></textarea>
            <div class="flex flex-wrap items-center gap-3">
              <input id="comment-photo" type="file" accept="image/*" class="text-sm" />
              <button type="submit" class="rounded-xl bg-brand-900 px-5 py-2 font-semibold text-brand-50 hover:bg-brand-800">Publicar</button>
            </div>
          </form>

          <p id="login-hint" class="mt-3 text-sm text-brand-700 hidden">Faça <a href="login.html" class="text-accent-600 font-semibold">login</a> para comentar e curtir.</p>

          <div id="comments-list" class="mt-6 space-y-4"></div>
        </section>
      </main>
    </div>

    <script src="api.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const productId = Number(params.get("id"));
      const session = getSession();

      function renderNav() {
        const nav = document.getElementById("nav-links");
        if (session) {
          nav.innerHTML = `
            <span class="text-sm text-brand-700">Olá, <strong>${session.user.name}</strong></span>
            <a href="#" onclick="logout(); return false;" class="hover:text-accent-600">Sair</a>
          `;
        } else {
          nav.innerHTML = `<a href="login.html" class="hover:text-accent-600">Entrar</a>`;
        }
      }

      async function loadProduct() {
        const p = await apiFetch(`/products/${productId}`);
        document.getElementById("category").textContent = p.category;
        document.getElementById("product-name").textContent = p.name;
        document.getElementById("description").textContent = p.description;
        document.getElementById("price").textContent = `R$ ${p.price.toFixed(2)}`;
        document.getElementById("stock").textContent = `${p.stock} em estoque`;
        document.getElementById("total-likes").textContent = p.totalLikes;

        const sellerLink = document.getElementById("seller-link");
        sellerLink.textContent = p.seller.profile?.storeName || p.seller.name;
        sellerLink.href = `seller-profile.html?id=${p.seller.id}`;

        const images = p.images.length ? p.images : [{ url: "", isPrimary: true }];
        const primary = images.find((i) => i.isPrimary) || images[0];
        document.getElementById("main-image").src = primary.url || "https://placehold.co/600x400?text=Sem+imagem";

        const thumbs = document.getElementById("thumbs");
        thumbs.innerHTML = "";
        images.forEach((img) => {
          if (!img.url) return;
          const btn = document.createElement("button");
          btn.innerHTML = `<img src="${img.url}" class="h-16 w-16 rounded-lg object-cover border border-brand-200" />`;
          btn.addEventListener("click", () => (document.getElementById("main-image").src = img.url));
          thumbs.appendChild(btn);
        });
      }

      function renderComment(c) {
        const canEdit = session && session.user.id === c.author.id;
        const canDelete = canEdit || (session && session.user.role === "admin");
        const heart = c.likedByMe ? "&#10084;" : "&#9825;";

        const div = document.createElement("div");
        div.className = "rounded-2xl border border-brand-200 p-4";
        div.innerHTML = `
          <div class="flex items-center justify-between text-sm">
            <div>
              <strong>${c.author.name}</strong>
              <span class="text-brand-600"> · ${new Date(c.createdAt).toLocaleString("pt-BR")}</span>
            </div>
            <div class="flex gap-2 items-center">
              <button data-like class="text-coral-600 text-xl leading-none" ${session ? "" : "disabled"}>${heart}</button>
              <span data-likes-count>${c.likesCount}</span>
              ${canEdit ? '<button data-edit class="text-xs underline">editar</button>' : ""}
              ${canDelete ? '<button data-delete class="text-xs underline text-red-600">excluir</button>' : ""}
            </div>
          </div>
          <p class="mt-2 whitespace-pre-wrap" data-text>${c.text}</p>
          ${c.photoUrl ? `<img src="${c.photoUrl}" class="mt-3 max-h-48 rounded-lg" />` : ""}
        `;

        const likeBtn = div.querySelector("[data-like]");
        const likesCountEl = div.querySelector("[data-likes-count]");
        if (session) {
          likeBtn.addEventListener("click", async () => {
            try {
              const updated = await apiFetch(`/comments/${c.id}/like`, { method: c.likedByMe ? "DELETE" : "POST" });
              c.likedByMe = updated.likedByMe;
              c.likesCount = updated.likesCount;
              likeBtn.innerHTML = c.likedByMe ? "&#10084;" : "&#9825;";
              likesCountEl.textContent = c.likesCount;
              const totalLikesEl = document.getElementById("total-likes");
              totalLikesEl.textContent = Number(totalLikesEl.textContent) + (c.likedByMe ? 1 : -1);
            } catch (error) {
              alert(error.message);
            }
          });
        }

        const editBtn = div.querySelector("[data-edit]");
        if (editBtn) {
          editBtn.addEventListener("click", async () => {
            const next = prompt("Editar comentário:", c.text);
            if (!next || next.trim() === c.text) return;
            try {
              const updated = await apiFetch(`/comments/${c.id}`, {
                method: "PATCH",
                body: JSON.stringify({ text: next.trim() }),
              });
              c.text = updated.text;
              div.querySelector("[data-text]").textContent = updated.text;
            } catch (error) {
              alert(error.message);
            }
          });
        }

        const delBtn = div.querySelector("[data-delete]");
        if (delBtn) {
          delBtn.addEventListener("click", async () => {
            if (!confirm("Excluir este comentário?")) return;
            try {
              await apiFetch(`/comments/${c.id}`, { method: "DELETE" });
              div.remove();
              await loadProduct(); // recarrega total de curtidas
            } catch (error) {
              alert(error.message);
            }
          });
        }

        return div;
      }

      async function loadComments() {
        const list = document.getElementById("comments-list");
        list.innerHTML = "";
        const comments = await apiFetch(`/products/${productId}/comments`);
        comments.forEach((c) => list.appendChild(renderComment(c)));
      }

      function wireCommentForm() {
        const form = document.getElementById("comment-form");
        if (!session) {
          document.getElementById("login-hint").classList.remove("hidden");
          return;
        }
        form.classList.remove("hidden");

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          const text = document.getElementById("comment-text").value.trim();
          const photo = document.getElementById("comment-photo").files[0];

          const formData = new FormData();
          formData.append("text", text);
          if (photo) formData.append("photo", photo);

          try {
            const response = await fetch(`/products/${productId}/comments`, {
              method: "POST",
              headers: { Authorization: `Bearer ${session.token}` },
              body: formData,
            });
            const body = await response.json();
            if (!response.ok) throw new Error(body.message || "Erro ao publicar comentário.");

            document.getElementById("comment-text").value = "";
            document.getElementById("comment-photo").value = "";
            document.getElementById("comments-list").prepend(renderComment(body));
            await loadProduct();
          } catch (error) {
            alert(error.message);
          }
        });
      }

      renderNav();
      if (!Number.isFinite(productId)) {
        document.querySelector("main").innerHTML = '<p class="text-red-600">Produto não informado. Volte para <a href="categories.html" class="underline">o catálogo</a>.</p>';
      } else {
        loadProduct().catch((error) => alert(error.message));
        loadComments().catch((error) => alert(error.message));
        wireCommentForm();
      }
    </script>
  </body>
</html>
