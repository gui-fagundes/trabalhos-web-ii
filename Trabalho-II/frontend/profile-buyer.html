<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketMVP | Perfil do comprador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { display: ["Space Grotesk", "sans-serif"], body: ["Plus Jakarta Sans", "sans-serif"] },
            colors: {
              brand: { 50: "#F8F7F2", 100: "#EDE8D8", 200: "#D9CEAA", 300: "#C7B57D", 400: "#B99B56", 500: "#A8853A", 600: "#886B2F", 700: "#665024", 800: "#43361A", 900: "#251E10" },
              accent: { 500: "#0A7D7A", 600: "#075F5D" },
              coral: { 500: "#E66A4E", 600: "#C85339" },
            },
          },
        },
      };
    </script>
  </head>
  <body class="font-body bg-brand-50 text-brand-900">
    <div class="min-h-screen">
      <header class="border-b border-brand-200/80 bg-white/75 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
          <a href="index.html" class="font-display text-xl font-bold">MarketMVP</a>
          <nav class="flex gap-3 text-sm font-medium">
            <a href="categories.html" class="hover:text-accent-600">Explorar</a>
            <a href="#" onclick="logout(); return false;" class="hover:text-accent-600">Sair</a>
          </nav>
        </div>
      </header>
      <main class="mx-auto max-w-3xl px-4 py-8">
        <section class="rounded-3xl border border-brand-200 bg-white p-6 shadow-sm">
          <h1 class="font-display text-3xl font-bold">Meu perfil</h1>
          <p class="mt-1 text-sm text-brand-700">Endereço e forma de pagamento preferencial. Só você tem acesso a esta página.</p>
          <form id="profile-form" class="mt-5 grid gap-4 sm:grid-cols-2">
            <label class="sm:col-span-1"><span class="mb-1 block text-sm font-medium">Telefone</span><input id="phone" required class="w-full rounded-xl border border-brand-300 px-4 py-2.5" /></label>
            <label class="sm:col-span-1"><span class="mb-1 block text-sm font-medium">CEP</span><input id="zipCode" required class="w-full rounded-xl border border-brand-300 px-4 py-2.5" /></label>
            <label class="sm:col-span-2"><span class="mb-1 block text-sm font-medium">Endereço</span><input id="addressLine" required class="w-full rounded-xl border border-brand-300 px-4 py-2.5" /></label>
            <label class="sm:col-span-1"><span class="mb-1 block text-sm font-medium">Cidade</span><input id="city" required class="w-full rounded-xl border border-brand-300 px-4 py-2.5" /></label>
            <label class="sm:col-span-1"><span class="mb-1 block text-sm font-medium">Estado</span><input id="state" required class="w-full rounded-xl border border-brand-300 px-4 py-2.5" /></label>
            <label class="sm:col-span-2"><span class="mb-1 block text-sm font-medium">Forma de pagamento preferencial</span><input id="paymentMethod" required placeholder="Ex.: Cartão de crédito Visa **** 1234" class="w-full rounded-xl border border-brand-300 px-4 py-2.5" /></label>
            <p id="msg" class="sm:col-span-2 hidden text-sm font-medium"></p>
            <button type="submit" class="sm:col-span-2 rounded-xl bg-brand-900 px-4 py-2.5 font-semibold text-brand-50">Salvar</button>
          </form>
        </section>
      </main>
    </div>
    <script src="api.js"></script>
    <script>
      const session = requireAuth(["buyer"]);
      const msg = document.getElementById("msg");
      const fields = ["phone", "zipCode", "addressLine", "city", "state", "paymentMethod"];

      async function load() {
        const data = await apiFetch("/profiles/me/buyer");
        if (!data) return;
        fields.forEach((f) => (document.getElementById(f).value = data[f] || ""));
      }

      document.getElementById("profile-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const body = Object.fromEntries(fields.map((f) => [f, document.getElementById(f).value.trim()]));
        try {
          await apiFetch("/profiles/me/buyer", { method: "PUT", body: JSON.stringify(body) });
          showFormMessage(msg, "Perfil salvo com sucesso.", false);
        } catch (error) {
          showFormMessage(msg, error.message, true);
        }
      });

      if (session) load().catch((error) => showFormMessage(msg, error.message, true));
    </script>
  </body>
</html>
