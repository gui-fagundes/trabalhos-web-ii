<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketMVP | Vendedor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { display: ["Space Grotesk", "sans-serif"], body: ["Plus Jakarta Sans", "sans-serif"] },
            colors: {
              brand: { 50: "#F8F7F2", 100: "#EDE8D8", 200: "#D9CEAA", 300: "#C7B57D", 400: "#B99B56", 500: "#A8853A", 600: "#886B2F", 700: "#665024", 800: "#43361A", 900: "#251E10" },
              accent: { 500: "#0A7D7A", 600: "#075F5D" },
              coral: { 500: "#E66A4E", 600: "#C85339" },
            },
          },
        },
      };
    </script>
  </head>
  <body class="font-body bg-brand-50 text-brand-900">
    <div class="min-h-screen">
      <header class="border-b border-brand-200/80 bg-white/75 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
          <a href="index.html" class="font-display text-xl font-bold">MarketMVP</a>
          <a href="categories.html" class="text-sm hover:text-accent-600">Explorar</a>
        </div>
      </header>
      <main id="content" class="mx-auto max-w-5xl px-4 py-8 space-y-6"></main>
    </div>
    <script src="api.js"></script>
    <script>
      const id = Number(new URLSearchParams(window.location.search).get("id"));

      (async function () {
        const el = document.getElementById("content");
        if (!Number.isFinite(id)) {
          el.innerHTML = '<p class="text-red-600">Vendedor não informado.</p>';
          return;
        }
        try {
          const data = await apiFetch(`/profiles/sellers/${id}`);
          el.innerHTML = `
            <section class="rounded-3xl border border-brand-200 bg-white p-6 shadow-sm">
              <p class="text-xs font-semibold uppercase tracking-wider text-brand-600">Loja em ${data.profile?.city || "-"}, ${data.profile?.state || "-"}</p>
              <h1 class="mt-1 font-display text-3xl font-bold">${data.profile?.storeName || data.name}</h1>
              <p class="mt-2 text-brand-700">${data.profile?.description || "Sem descrição cadastrada."}</p>
              <div class="mt-3 text-sm text-brand-700">
                <p>Contato: ${data.profile?.contact || "-"}</p>
                <p>Categorias: ${data.profile?.categories || "-"}</p>
              </div>
            </section>
            <section>
              <h2 class="font-display text-2xl font-bold">Produtos deste vendedor</h2>
              <div class="mt-3 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
                ${data.products
                  .map(
                    (p) => `
                  <article class="rounded-2xl border border-brand-200 bg-white p-4 shadow-sm">
                    <div class="mb-3 flex h-40 items-center justify-center overflow-hidden rounded-xl bg-brand-100">
                      ${p.primaryImage ? `<img src="${p.primaryImage}" class="h-full w-full object-cover" />` : '<span class="text-brand-600 text-sm">Sem imagem</span>'}
                    </div>
                    <p class="text-xs uppercase tracking-wider text-brand-600">${p.category}</p>
                    <h3 class="mt-1 font-display text-lg font-bold">${p.name}</h3>
                    <div class="mt-3 flex items-center justify-between">
                      <span class="font-bold text-coral-600">R$ ${p.price.toFixed(2)}</span>
                      <a href="product-details.html?id=${p.id}" class="rounded-lg border border-brand-300 px-3 py-1.5 text-sm font-semibold">Ver</a>
                    </div>
                  </article>`,
                  )
                  .join("") || '<p class="text-sm text-brand-700">Este vendedor ainda não cadastrou produtos.</p>'}
              </div>
            </section>
          `;
        } catch (error) {
          el.innerHTML = `<p class="text-red-600">${error.message}</p>`;
        }
      })();
    </script>
  </body>
</html>
