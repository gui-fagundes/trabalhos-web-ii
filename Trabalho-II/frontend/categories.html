<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketMVP | Categorias</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
              body: ["Plus Jakarta Sans", "sans-serif"],
            },
            colors: {
              brand: { 50: "#F8F7F2", 100: "#EDE8D8", 200: "#D9CEAA", 300: "#C7B57D", 400: "#B99B56", 500: "#A8853A", 600: "#886B2F", 700: "#665024", 800: "#43361A", 900: "#251E10" },
              accent: { 500: "#0A7D7A", 600: "#075F5D" },
              coral: { 500: "#E66A4E", 600: "#C85339" },
            },
          },
        },
      };
    </script>
    <style>
      .grid-bg {
        background-image: radial-gradient(#d9ceaa 0.8px, transparent 0.8px), radial-gradient(#d9ceaa 0.8px, #f8f7f2 0.8px);
        background-size: 28px 28px;
        background-position: 0 0, 14px 14px;
      }
    </style>
  </head>
  <body class="font-body bg-brand-50 text-brand-900">
    <div class="min-h-screen grid-bg">
      <header class="border-b border-brand-200/80 bg-white/75 backdrop-blur">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
          <a href="index.html" class="font-display text-xl font-bold">MarketMVP</a>
          <nav class="hidden gap-5 text-sm font-medium md:flex">
            <a href="index.html" class="hover:text-accent-600">Início</a>
            <a href="cart.html" class="hover:text-accent-600">Carrinho</a>
            <a href="orders.html" class="hover:text-accent-600">Pedidos</a>
          </nav>
        </div>
      </header>

      <main class="mx-auto max-w-7xl space-y-6 px-4 py-8 sm:px-6 lg:px-8">
        <section class="rounded-3xl border border-brand-200 bg-white p-6 shadow-sm">
          <h1 class="font-display text-3xl font-bold">Navegue pelas categorias</h1>
          <p class="mt-1 text-sm text-brand-700">Explore produtos por categoria e refine sua busca.</p>
          <div class="mt-4 grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
            <button class="rounded-xl bg-brand-100 px-4 py-3 text-left font-semibold">Eletrônicos</button>
            <button class="rounded-xl bg-brand-100 px-4 py-3 text-left font-semibold">Casa e decoração</button>
            <button class="rounded-xl bg-brand-100 px-4 py-3 text-left font-semibold">Moda</button>
            <button class="rounded-xl bg-brand-100 px-4 py-3 text-left font-semibold">Esportes</button>
          </div>
        </section>

        <section id="products-grid" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></section>
      </main>
    </div>
    <script src="api.js"></script>
    <script>
      (async function () {
        try {
          const products = await apiFetch("/products");
          const grid = document.getElementById("products-grid");
          if (products.length === 0) {
            grid.innerHTML = '<p class="text-sm text-brand-700">Nenhum produto cadastrado ainda.</p>';
            return;
          }
          products.forEach((p) => {
            const article = document.createElement("article");
            article.className = "rounded-2xl border border-brand-200 bg-white p-4 shadow-sm";
            article.innerHTML = `
              <div class="mb-3 flex h-40 items-center justify-center overflow-hidden rounded-xl bg-brand-100">
                ${p.primaryImage ? `<img src="${p.primaryImage}" class="h-full w-full object-cover" />` : '<span class="text-brand-600 text-sm">Sem imagem</span>'}
              </div>
              <p class="text-xs font-semibold uppercase tracking-wider text-brand-600">${p.category}</p>
              <h2 class="mt-1 font-display text-lg font-bold">${p.name}</h2>
              <p class="mt-1 text-sm text-brand-700">${(p.description || "").slice(0, 120)}</p>
              <div class="mt-3 flex items-center justify-between">
                <span class="font-bold text-coral-600">R$ ${p.price.toFixed(2)}</span>
                <a href="product-details.html?id=${p.id}" class="rounded-lg border border-brand-300 px-3 py-1.5 text-sm font-semibold">Ver</a>
              </div>
              <p class="mt-2 text-xs text-brand-600">Vendedor: ${p.seller.storeName || p.seller.name}</p>
            `;
            grid.appendChild(article);
          });
        } catch (error) {
          document.getElementById("products-grid").innerHTML = `<p class="text-sm text-red-600">${error.message}</p>`;
        }
      })();
    </script>
  </body>
</html>
